name: Release

# Cut a release by pushing a tag, e.g. `git tag v0.1.0 && git push --tags`.
# Job 1 creates the GitHub Release for the tag; job 2 builds a binary per
# platform and attaches it. (upload-rust-binary-action does NOT create the
# release itself — it requires the release to exist first.)
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Guard: never cut a release for a tag that disagrees with Cargo.toml.
      # This is what would have caught a stray `git tag v0.1.2` on 0.1.1 code.
      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')"
          echo "tag=$tag  cargo=$ver"
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag v$tag does not match Cargo.toml version $ver — aborting"
            exit 1
          fi
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu }
          - { os: macos-latest,   target: x86_64-apple-darwin }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: streamsmith
          target: ${{ matrix.target }}
          token: ${{ secrets.GITHUB_TOKEN }}
