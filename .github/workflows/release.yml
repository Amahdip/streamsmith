name: Release

# Cut a release by pushing a tag, e.g. `git tag v0.1.0 && git push --tags`.
# Builds a static-ish binary per platform and attaches it to the GitHub Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  upload:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu }
          - { os: macos-latest,   target: x86_64-apple-darwin }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: streamsmith
          target: ${{ matrix.target }}
          # Attaches the archive to the Release and (for the first tag) creates it.
          token: ${{ secrets.GITHUB_TOKEN }}
